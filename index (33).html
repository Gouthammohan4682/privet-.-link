<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Privt Enter Work - Upload</title>
<style>
  body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: linear-gradient(135deg, #232526, #414345);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  h2 { color: #ffdd57; margin-bottom: 20px; }
  form {
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
  }
  input[type="file"] { margin: 10px 0; padding: 8px; color: #fff; }
  button {
    background: #ffdd57;
    color: #000;
    font-weight: bold;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover { background: #ffc107; }
  #message { margin-top: 15px; }
</style>
</head>
<body>
<h2>Privt Enter Work - Admin Upload</h2>
<form id="uploadForm">
  <input type="file" id="fileInput" multiple required><br>
  <button type="submit">Upload</button>
</form>
<div id="message"></div>

<script>
const uploadForm = document.getElementById("uploadForm");
const fileInput = document.getElementById("fileInput");
const message = document.getElementById("message");

uploadForm.addEventListener("submit", function(e){
  e.preventDefault();
  let files = fileInput.files;
  if(files.length === 0){
    message.innerHTML = "<p style='color:red;'>Please select at least one file.</p>";
    return;
  }

  let storedFiles = JSON.parse(localStorage.getItem("uploadedFiles")) || [];

  Array.from(files).forEach(file => {
    let reader = new FileReader();
    reader.onload = function(event){
      storedFiles.push({
        name: file.name,
        data: event.target.result
      });
      localStorage.setItem("uploadedFiles", JSON.stringify(storedFiles));
      message.innerHTML = "<p style='color:lime;'>Files uploaded successfully! Refresh main page.</p>";
    };
    reader.readAsDataURL(file);
  });
});
</script>
</body>
</html>
